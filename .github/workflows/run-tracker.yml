name: Delaware Bill Tracker

on:
  workflow_dispatch:    # Manual run
  repository_dispatch:  # Triggered by update-bill-list workflow
    types: [tracker-trigger]
  schedule:
    - cron: "0 10 * * *"   # 6 AM Eastern (10 AM UTC)

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install requests python-dateutil

    - name: Run main tracker
      run: |
        python scripts/tracker.py

    - name: Commit updated state files
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add data/*.json || echo "Nothing to add"
        git commit -m "Update bill state snapshots" || echo "No changes to commit"
        git push || echo "No changes to push"
