name: Update Bill List

on:
  issues:
    types: [opened]

jobs:
  update-list:
    if: contains(github.event.issue.labels.*.name, 'bill-update')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Debug issue body
      run: |
        echo "RAW ISSUE BODY:"
        printf "%s\n" "${{ github.event.issue.body }}"

    - name: Extract bill data from issue
      id: extract
      run: |
        body="${{ github.event.issue.body }}"

        bill=$(echo "$body" | awk '/^### Bill Number/{getline; print $0}' | xargs)
        action=$(echo "$body" | awk '/^### Action/{getline; print $0}' | xargs)

        echo "bill_number=$bill" >> $GITHUB_OUTPUT
        echo "action=$action" >> $GITHUB_OUTPUT
        
    - name: Ensure config directory exists
      run: mkdir -p config

    - name: Create bills.json if it does not exist
      run: |
        if [ ! -f config/bills.json ]; then
          echo "[]" > config/bills.json
        fi

    - name: Update bills.json
      run: |
        BILL="${{ steps.extract.outputs.bill_number }}"
        ACTION="${{ steps.extract.outputs.action }}"

        if [ "$ACTION" = "Add" ]; then
          jq --arg bill "$BILL" '. + [$bill] | unique' config/bills.json > config/tmp.json
        else
          jq --arg bill "$BILL" 'map(select(. != $bill))' config/bills.json > config/tmp.json
        fi

        mv config/tmp.json config/bills.json

    - name: Commit updated bill list
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add config/bills.json
        git commit -m "Updated bill list via Issue Form" || echo "No changes to commit"
        git push

    - name: Trigger main bill tracker workflow
      uses: peter-evans/repository-dispatch@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        event-type: tracker-trigger
